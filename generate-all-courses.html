<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generate All Course Content</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Roboto', Arial, sans-serif; background: #f8f9fa; color: #202124; min-height: 100vh; padding: 40px 24px; }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-family: 'Google Sans', Arial, sans-serif; font-size: 28px; font-weight: 400; margin-bottom: 8px; }
  p { font-size: 14px; color: #5f6368; margin-bottom: 24px; }
  .course-item { background: #fff; border: 1px solid #e8eaed; border-radius: 8px; padding: 16px 20px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; }
  .course-icon { font-size: 24px; flex-shrink: 0; }
  .course-info { flex: 1; }
  .course-name { font-size: 15px; font-weight: 500; color: #202124; }
  .course-meta { font-size: 12px; color: #5f6368; margin-top: 2px; }
  .status { font-size: 13px; font-weight: 500; min-width: 120px; text-align: right; }
  .status.pending { color: #80868b; }
  .status.generating { color: #1a73e8; }
  .status.done { color: #137333; }
  .status.error { color: #c5221f; }
  .btn { background: #1a73e8; color: #fff; border: none; border-radius: 4px; padding: 12px 28px; font-size: 15px; font-family: 'Google Sans', Arial, sans-serif; font-weight: 500; cursor: pointer; margin-bottom: 20px; }
  .btn:hover { background: #1765cc; }
  .btn:disabled { background: #dadce0; color: #80868b; cursor: not-allowed; }
  .log { background: #202124; color: #e8eaed; border-radius: 8px; padding: 16px; font-family: monospace; font-size: 13px; line-height: 1.6; max-height: 200px; overflow-y: auto; display: none; margin-top: 16px; }
  .progress-bar-wrap { background: #f1f3f4; border-radius: 100px; height: 8px; margin-bottom: 20px; }
  .progress-bar { background: #1a73e8; height: 8px; border-radius: 100px; transition: width 0.4s; width: 0%; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🤖 Generate All Course Content</h1>
  <p>This will generate AI content for all courses that don't have modules yet. Takes about 2-3 minutes.</p>

  <button class="btn" id="startBtn" onclick="startGeneration()">Generate All Courses →</button>

  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div id="courseList"></div>
  <div class="log" id="log"></div>
</div>

<script>
const BASE = "https://fvjerthbdiaeomhjvcdg.supabase.co/rest/v1";
const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2amVydGhiZGlhZW9taGp2Y2RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNjkxNTAsImV4cCI6MjA5Nzk0NTE1MH0._y4A3ipIew0GhsCqlc2Ox6p0lvW7X0nCSWEwfHUxEzE";
const HEADERS = { "apikey": KEY, "Authorization": "Bearer " + KEY, "Content-Type": "application/json" };
const EDGE = "https://fvjerthbdiaeomhjvcdg.supabase.co/functions/v1/generate-course-content";

const PENDING_COURSES = [
  { id: "aaf1919c-958a-4ca0-90a1-ecfa752080d3", name: "Blockchain & Decentralized Systems", department: "Technology", level: "intermediate", icon: "⛓️" },
  { id: "e94aa30d-d5fa-4e24-a67f-040e1afe0305", name: "Computer Science & AI", department: "Technology", level: "beginner", icon: "💻" },
  { id: "391d6c40-3e6f-470c-9f65-f2006c45840b", name: "Design & Creative Tech", department: "Design", level: "beginner", icon: "🎨" },
  { id: "e80a6117-0218-40b6-9af5-799232b8066b", name: "8th Standard Foundation", department: "School", level: "beginner", icon: "📚" },
  { id: "635ddfe9-4909-4d77-85a8-799502d4752e", name: "10th Standard Excellence", department: "School", level: "intermediate", icon: "📗" },
  { id: "6c1f8379-bbf7-4b2c-83ab-eec92c8c8627", name: "12th Standard Mastery", department: "School", level: "intermediate", icon: "📘" }
];

// Render course list
document.getElementById('courseList').innerHTML = PENDING_COURSES.map((c, i) => `
  <div class="course-item" id="item-${i}">
    <div class="course-icon">${c.icon}</div>
    <div class="course-info">
      <div class="course-name">${c.name}</div>
      <div class="course-meta">${c.department} · ${c.level}</div>
    </div>
    <div class="status pending" id="status-${i}">⏳ Pending</div>
  </div>`).join('');

function log(msg) {
  const el = document.getElementById('log');
  el.style.display = 'block';
  el.innerHTML += msg + '\n';
  el.scrollTop = el.scrollHeight;
}

async function startGeneration() {
  const btn = document.getElementById('startBtn');
  btn.disabled = true; btn.textContent = 'Generating…';

  let done = 0;
  for (let i = 0; i < PENDING_COURSES.length; i++) {
    const c = PENDING_COURSES[i];
    document.getElementById('status-' + i).textContent = '⚙️ Generating…';
    document.getElementById('status-' + i).className = 'status generating';
    log(`[${i+1}/${PENDING_COURSES.length}] Generating: ${c.name}…`);

    try {
      const res = await fetch(EDGE, {
        method: "POST",
        headers: { "apikey": KEY, "Authorization": "Bearer " + KEY, "Content-Type": "application/json" },
        body: JSON.stringify({ course_id: c.id, course_name: c.name, department: c.department, level: c.level })
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById('status-' + i).textContent = '✅ ' + data.modules_count + ' modules done';
        document.getElementById('status-' + i).className = 'status done';
        log(`  ✅ ${c.name} — ${data.modules_count} modules generated`);
      } else {
        throw new Error(data.error || 'Unknown error');
      }
    } catch(e) {
      document.getElementById('status-' + i).textContent = '❌ Error';
      document.getElementById('status-' + i).className = 'status error';
      log(`  ❌ ${c.name} — Error: ${e.message}`);
    }

    done++;
    document.getElementById('progressBar').style.width = (done / PENDING_COURSES.length * 100) + '%';
    await new Promise(r => setTimeout(r, 1000));
  }

  btn.textContent = '✅ All done!';
  log('\n🎉 All courses generated successfully!');
}
</script>
</body>
</html>
